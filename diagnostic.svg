<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <rect width="1200" height="300" rx="8" fill="#09090b"/>
  <rect x="2" y="2" width="1196" height="296" rx="6" stroke="#10b981" stroke-opacity="0.1" stroke-width="1"/>
  
  <!-- Tactical Grid -->
  <defs>
    <pattern id="diagGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" rx="8" fill="url(#diagGrid)"/>

  <!-- Scanning Line Glow -->
  <rect width="1200" height="2" fill="#10b981" fill-opacity="0.05">
    <animate attributeName="y" from="0" to="300" dur="8s" repeatCount="indefinite" />
  </rect>

  <!-- Labels & Values (Centered Layout) -->
  <g font-family="JetBrains Mono, monospace" font-size="14">
    <g transform="translate(180, 60)">
      <text fill="#10b981" font-weight="bold">[ █ ENGINEER   ]</text>
      <text x="200" fill="#f4f4f5">Harrison Vance</text>
      <text x="840" text-anchor="end" fill="#10b981" font-size="12" font-weight="bold">[ OK ]</text>
    </g>
    <g transform="translate(180, 100)">
      <text fill="#10b981" font-weight="bold">[ █ FOCUS      ]</text>
      <text x="200" fill="#f4f4f5">Distributed Systems // High-Performance APIs</text>
      <text x="840" text-anchor="end" fill="#10b981" font-size="12" font-weight="bold">[ ACTIVE ]</text>
    </g>
    <g transform="translate(180, 140)">
      <text fill="#10b981" font-weight="bold">[ █ INFRA      ]</text>
      <text x="200" fill="#f4f4f5">AWS // Kubernetes // Terraform</text>
      <text x="840" text-anchor="end" fill="#10b981" font-size="12" font-weight="bold">[ SECURE ]</text>
    </g>
    <g transform="translate(180, 180)">
      <text fill="#10b981" font-weight="bold">[ █ DOMAIN     ]</text>
      <text x="200" fill="#f4f4f5">Cloud Native Architecture // SRE</text>
      <text x="840" text-anchor="end" fill="#10b981" font-size="12" font-weight="bold">[ OPTIMAL ]</text>
    </g>
    <g transform="translate(180, 220)">
      <text fill="#10b981" font-weight="bold">[ █ FOOTPRINT  ]</text>
      <text x="200" fill="#f4f4f5">10+ Year Verified Infrastructure Ledger</text>
      <text x="840" text-anchor="end" fill="#10b981" font-size="12" font-weight="bold">[ VERIFIED ]</text>
    </g>
  </g>

  <!-- Corner Brackets -->
  <path d="M 30 60 L 30 30 L 60 30" stroke="#10b981" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  <path d="M 1140 30 L 1170 30 L 1170 60" stroke="#10b981" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  <path d="M 30 240 L 30 270 L 60 270" stroke="#10b981" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  <path d="M 1140 270 L 1170 270 L 1170 240" stroke="#10b981" stroke-width="2" stroke-opacity="0.3" fill="none"/>
</svg>