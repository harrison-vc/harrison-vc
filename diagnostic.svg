<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" fill="none">
  <rect width="1200" height="240" fill="#09090b"/>
  
  <!-- Structural Skeleton -->
  <path d="M 60 60 L 1140 60 M 60 180 L 1140 180" stroke="#18181b" stroke-width="1"/>
  <path d="M 400 60 L 400 180 M 800 60 L 800 180" stroke="#18181b" stroke-width="1"/>

  <g font-family="system-ui, -apple-system, sans-serif" font-size="14">
    <!-- Focus -->
    <text x="60" y="40" fill="#71717a" font-weight="500" letter-spacing="2">01 // DOMAIN_FOCUS</text>
