<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" fill="none">
  <style>
    .mono { font-family: 'JetBrains Mono', 'Geist Mono', monospace; }
    .sans { font-family: 'Geist', 'Inter', sans-serif; }
    .module-title { font-size: 10px; font-weight: 500; letter-spacing: 2px; fill: #52525b; text-transform: uppercase; }
    .module-value { font-size: 18px; font-weight: 600; fill: #f4f4f5; }
    .module-sub { font-size: 14px; fill: #71717a; }
  </style>

  <rect width="1200" height="240" fill="#09090b"/>

  <!-- Asymmetric Structural Grid -->
  <path d="M 60 40 L 1140 40 M 60 200 L 1140 200" stroke="#18181b" stroke-width="1"/>
  <path d="M 60 40 L 60 200 M 1140 40 L 1140 200" stroke="#18181b" stroke-width="1"/>
  <path d="M 380 40 L 380 200 M 760 40 L 760 200" stroke="#18181b" stroke-width="1"/>

  <!-- Module 01: Systems -->
  <g transform="translate(80, 80)">
    <text class="mono module-title">01 // DOMAIN</text>
    <text y="30" class="sans module-value">Distributed Systems</text>
    <text y="55" class="sans module-sub">Low-Latency API Design</text>
  </g>

  <!-- Module 02: Infrastructure -->
  <g transform="translate(400, 80)">
    <text class="mono module-title">02 // CORE_STACK</text>
    <text y="30" class="sans module-value">AWS &amp; Kubernetes</text>
    <text y="55" class="sans module-sub">Terraform, Lambda, Docker</text>
  </g>

  <!-- Module 03: Reliability -->
  <g transform="translate(780, 80)">
    <text class="mono module-title">03 // PROTOCOLS</text>
    <text y="30" class="sans module-value">SRE &amp; Observability</text>
    <text y="55" class="sans module-sub">Zero-Trust / High-Availability</text>
  </g>

  <!-- Haptic Depth (Double Bezel) - Micro-Detail -->
  <rect x="60" y="40" width="1080" height="1" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="60" y="199" width="1080" height="1" fill="#ffffff" fill-opacity="0.05"/>
</svg>