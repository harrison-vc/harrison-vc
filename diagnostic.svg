<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <style>
    .mono { font-family: 'JetBrains Mono', 'Geist Mono', monospace; }
    .sans { font-family: 'Geist', 'Inter', sans-serif; }
    @keyframes scan {
      0% { transform: translateY(0); }
      100% { transform: translateY(300px); }
    }
    .scan-line { animation: scan 10s linear infinite; }
  </style>

  <rect width="1200" height="300" rx="0" fill="#09090b"/>
  
  <!-- Stealth Grid -->
  <path d="M 0 60 L 1200 60 M 0 120 L 1200 120 M 0 180 L 1200 180 M 0 240 L 1200 240" stroke="#18181b" stroke-width="1"/>
  <path d="M 300 0 L 300 300 M 600 0 L 600 300 M 900 0 L 900 300" stroke="#18181b" stroke-width="1"/>

  <!-- Scanning Line (Subtle) -->
  <rect width="1200" height="1" fill="#10b981" fill-opacity="0.05" class="scan-line"/>

  <!-- Module 01: Core -->
  <g transform="translate(60, 45)">
    <text fill="#52525b" class="mono" font-size="10" letter-spacing="1">MOD_01 // CORE_STACK</text>
    <text y="25" fill="#f4f4f5" class="sans" font-size="18" font-weight="600">AWS / KUBERNETES</text>
    <text y="45" fill="#a1a1aa" class="sans" font-size="14">Terraform, Lambda, Docker</text>
  </g>

  <!-- Module 02: Performance -->
  <g transform="translate(360, 45)">
    <text fill="#52525b" class="mono" font-size="10" letter-spacing="1">MOD_02 // PERFORMANCE</text>
    <text y="25" fill="#f4f4f5" class="sans" font-size="18" font-weight="600">LOW_LATENCY</text>
    <text y="45" fill="#a1a1aa" class="sans" font-size="14">Go, Rust, Redis, FastAPI</text>
  </g>

  <!-- Module 03: Data -->
  <g transform="translate(660, 45)">
    <text fill="#52525b" class="mono" font-size="10" letter-spacing="1">MOD_03 // DATA_STORAGE</text>
    <text y="25" fill="#f4f4f5" class="sans" font-size="18" font-weight="600">PERSISTENCE</text>
    <text y="45" fill="#a1a1aa" class="sans" font-size="14">PostgreSQL, MongoDB, Supabase</text>
  </g>

  <!-- Module 04: Availability -->
  <g transform="translate(960, 45)">
    <text fill="#52525b" class="mono" font-size="10" letter-spacing="1">MOD_04 // AVAILABILITY</text>
    <text y="25" fill="#10b981" class="sans" font-size="18" font-weight="700">ACTIVE</text>
    <text y="45" fill="#a1a1aa" class="sans" font-size="14">Remote / Global</text>
  </g>

  <!-- Bottom Data Stream -->
  <g transform="translate(60, 180)">
    <text fill="#52525b" class="mono" font-size="10" letter-spacing="1">SYSTEM_RELIABILITY_LEDGER</text>
    <rect y="20" width="1080" height="40" rx="4" fill="#18181b" fill-opacity="0.5"/>
    <text x="20" y="45" fill="#10b981" class="mono" font-size="14">SYNC_COMPLETE</text>
    <text x="160" y="45" fill="#71717a" class="mono" font-size="14">|||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||| 100%</text>
  </g>
</svg>