<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" fill="none">
  <style>
    .name { font-family: 'system-ui', '-apple-system', sans-serif; font-size: 88px; font-weight: 900; letter-spacing: -6px; fill: #f4f4f5; }
    .label { font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 6px; fill: #71717a; text-transform: uppercase; }
  </style>

  <rect width="1200" height="240" fill="#09090b"/>
  
  <!-- Subtle Architectural Texture (Asymmetric Grid) -->
  <defs>
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <rect x="600" width="600" height="240" fill="url(#dotGrid)"/>

  <!-- Left Aligned Core Identity -->
  <text x="60" y="125" class="name">HARRISON VANCE</text>
  
  <g transform="translate(64, 165)">
    <text class="label">INFRASTRUCTURE ARCHITECT</text>
    <rect y="12" width="40" height="2" fill="#10b981"/>
  </g>
</svg>