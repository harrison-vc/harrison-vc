name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: General Metrics (Full)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: harrison-vc
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Bangkok
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          filename: github-metrics.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update metrics [skip ci]"

      - name: GitHub Stats (Card)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: harrison-vc
          template: classic
          base: header, activity, community, repositories, metadata
          filename: github-stats.svg
          config_display: columns
          output_action: commit
          committer_branch: output
          committer_message: "chore: update stats [skip ci]"

      - name: Top Languages (Compact)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: harrison-vc
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          filename: github-languages.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update languages [skip ci]"
